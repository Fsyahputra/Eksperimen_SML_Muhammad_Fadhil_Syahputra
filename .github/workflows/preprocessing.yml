name: Automated Preprocessing Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch: # Memungkinkan menjalankan workflow secara manual dari tab Actions di GitHub

jobs:
  preprocess:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Diperlukan agar Actions bisa commit & push file kembali ke repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn

      - name: Run Preprocessing Script
        run: |
          cd preprocessing
          python automate_Muhammad_Fadhil_Syahputra.py

      - name: Commit and Push preprocessed dataset
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Cek jika ada perubahan pada file preprocessed csv
          git add preprocessing/titanic_preprocessed.csv
          if git diff --staged --quiet; then
            echo "Tidak ada perubahan pada dataset."
          else
            git commit -m "chore: auto-update preprocessed dataset [skip ci]"
            git push
          fi
